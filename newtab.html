<!DOCTYPE html>
<html lang="en" data-mode="newtab">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
  <!-- Full-viewport override — inline styles are allowed in MV3 -->
  <style>
    html, body { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Tab<span class="v">Flow</span></div>
    <div class="view-toggle" id="viewToggle">
      <button class="vt-btn" id="vtGrid" data-mode="grid" title="Overview grid">⊞ Grid</button>
      <button class="vt-btn" id="vtFlow" data-mode="coverflow" title="Cover Flow">≋ Cover Flow</button>
    </div>
  </div>

  <div class="overview-header" id="overviewHeader">
    <div class="ov-count" id="ovCount">— tabs open</div>
    <div class="ov-chips" id="ovChips"></div>
  </div>

  <div class="select-bar" id="selectBar">
    <span id="selectCount">0 selected</span>
    <button class="sb-close" id="selClose">Close selected</button>
    <button class="sb-clear" id="selClear">Clear</button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search" type="text" id="search" placeholder="Filter tabs…"
           autocomplete="off" spellcheck="false">
  </div>

  <div class="footer">
    <div class="counter">
      <span class="n" id="cur">—</span> of <span id="tot">—</span>
    </div>
    <div class="hints">
      <div class="hint"><span class="key">←</span><span class="key">→</span>&nbsp;navigate</div>
      <div class="hint"><span class="key">↵</span>&nbsp;open</div>
      <div class="hint"><span class="key">Esc</span>&nbsp;close tab</div>
      <div class="hint"><span class="key">/</span>&nbsp;search</div>
      <div class="hint" id="hintExitGroup" style="display:none"><span class="key">↑</span>&nbsp;exit group</div>
    </div>
  </div>

  <div class="stage-wrap" id="stageWrap">
    <div class="cards" id="cards"></div>
    <div class="shelf"></div>
    <div class="empty" id="empty">No tabs match</div>
  </div>

  <div class="grid-scroll" id="gridScroll"></div>

  <div class="detail" id="detail"></div>

  <div class="toast" id="toast">
    <span class="toast-label" id="toastLabel"></span>
    <button class="toast-undo" id="toastUndo">⌘Z Undo</button>
  </div>

  <script src="models.js"></script>
  <script src="triage.js"></script>
  <script src="grid.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
