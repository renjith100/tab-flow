<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TabFlow — Generate Icons</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 32px; }
    .preview-row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; margin-bottom: 32px; }
    .preview-block { text-align: center; }
    .preview-block p { color: #888; font-size: 12px; margin: 6px 0 0; }
    .swatch { display: inline-flex; padding: 12px; border-radius: 10px; }
    .swatch.dark  { background: #3c3c3c; }
    .swatch.light { background: #e8e8e8; }
    canvas { display: block; }
    button { margin-top: 8px; padding: 10px 24px; background: #8b5cf6; color: #fff;
             border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #7c3aed; }
    h3 { color: #aaa; font-size: 13px; font-weight: normal; margin: 0 0 12px; }
  </style>
</head>
<body>
  <h2>TabFlow Icon Generator</h2>

  <h3>Preview — dark toolbar</h3>
  <div id="previews-dark" class="preview-row"></div>

  <h3>Preview — light toolbar</h3>
  <div id="previews-light" class="preview-row"></div>

  <button onclick="generateAll()">Download All Icons</button>

  <script>
    const SIZES = [16, 48, 128];

    function roundRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawIcon(ctx, size) {
      // No background — transparent canvas

      const cw  = size * 0.28;   // card width — fills canvas edge to edge
      const cch = size * 0.68;   // centre card height
      const sch = size * 0.52;   // side card height
      const cy  = size * 0.50;   // vertical centre
      const cr  = Math.max(1, size * 0.06);  // card corner radius
      const strokeW = Math.max(1.5, size * 0.022);  // bold stroke, visible at all sizes

      // --- Left card ---
      ctx.save();
      ctx.translate(size * 0.21, cy + size * 0.02);
      ctx.rotate(-0.34);
      roundRectPath(ctx, -cw / 2, -sch / 2, cw, sch, cr);
      ctx.fillStyle = 'rgba(167, 139, 250, 0.82)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(139, 92, 246, 0.95)';
      ctx.lineWidth = strokeW;
      ctx.stroke();
      ctx.restore();

      // --- Right card ---
      ctx.save();
      ctx.translate(size * 0.79, cy + size * 0.02);
      ctx.rotate(0.34);
      roundRectPath(ctx, -cw / 2, -sch / 2, cw, sch, cr);
      ctx.fillStyle = 'rgba(167, 139, 250, 0.82)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(139, 92, 246, 0.95)';
      ctx.lineWidth = strokeW;
      ctx.stroke();
      ctx.restore();

      // --- Centre card — solid violet with shadow ---
      ctx.save();
      if (size >= 48) {
        ctx.shadowColor = 'rgba(109, 40, 217, 0.60)';
        ctx.shadowBlur  = size * 0.16;
        ctx.shadowOffsetY = size * 0.03;
      }
      roundRectPath(ctx, size * 0.5 - cw / 2, cy - cch / 2, cw, cch, cr);
      ctx.fillStyle = '#8b5cf6';
      ctx.fill();
      ctx.restore();

      // Light edge on centre card (drawn without shadow)
      ctx.save();
      roundRectPath(ctx, size * 0.5 - cw / 2, cy - cch / 2, cw, cch, cr);
      ctx.strokeStyle = 'rgba(220, 210, 255, 0.70)';
      ctx.lineWidth = strokeW;
      ctx.stroke();
      ctx.restore();
    }

    function makeCanvas(size, displaySize) {
      const canvas = document.createElement('canvas');
      canvas.width  = displaySize;
      canvas.height = displaySize;
      const ctx = canvas.getContext('2d');
      ctx.scale(displaySize / size, displaySize / size);
      drawIcon(ctx, size);
      return canvas;
    }

    function generateAll() {
      SIZES.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width  = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        drawIcon(ctx, size);
        canvas.toBlob(blob => {
          const a = document.createElement('a');
          a.href     = URL.createObjectURL(blob);
          a.download = `icon${size}.png`;
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        }, 'image/png');
      });
    }

    window.onload = () => {
      const darkWrap  = document.getElementById('previews-dark');
      const lightWrap = document.getElementById('previews-light');

      SIZES.forEach(size => {
        const displaySize = Math.max(size, 64);

        // Dark swatch
        const darkBlock = document.createElement('div');
        darkBlock.className = 'preview-block';
        const darkSwatch = document.createElement('div');
        darkSwatch.className = 'swatch dark';
        darkSwatch.appendChild(makeCanvas(size, displaySize));
        darkBlock.appendChild(darkSwatch);
        const darkLabel = document.createElement('p');
        darkLabel.textContent = `${size}×${size}`;
        darkBlock.appendChild(darkLabel);
        darkWrap.appendChild(darkBlock);

        // Light swatch
        const lightBlock = document.createElement('div');
        lightBlock.className = 'preview-block';
        const lightSwatch = document.createElement('div');
        lightSwatch.className = 'swatch light';
        lightSwatch.appendChild(makeCanvas(size, displaySize));
        lightBlock.appendChild(lightSwatch);
        const lightLabel = document.createElement('p');
        lightLabel.textContent = `${size}×${size}`;
        lightBlock.appendChild(lightLabel);
        lightWrap.appendChild(lightBlock);
      });
    };
  </script>
</body>
</html>
